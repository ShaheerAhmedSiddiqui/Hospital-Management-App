name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-backend .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-backend

      - name: Deploy Backend Container
        run: |
          # Stop and remove old container if it exists
          docker stop hospital-backend || true
          docker rm hospital-backend || true
          
          # Pull the fresh image
          docker pull ${{ secrets.DOCKER_USERNAME }}/hospital-backend
          
          # Run backend container with ALL necessary environment variables
          docker run -d \
            --name hospital-backend \
            --network hospital-network \
            -p 5000:5000 \
            -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e EMAIL_USER="${{ secrets.EMAIL_USER }}" \
            -e EMAIL_PASS="${{ secrets.EMAIL_PASS }}" \
            ${{ secrets.DOCKER_USERNAME }}/hospital-backend

      - name: Free up disk space
        run: docker system prune -f