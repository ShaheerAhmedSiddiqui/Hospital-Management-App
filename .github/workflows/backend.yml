name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
      - 'docker-compose.yml'
jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-backend .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-backend

      - name: Deploy Backend Container via Docker Compose
        run: |
          # Export variables for the docker-compose.yml file to read
          export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
          export MONGODB_URI="${{ secrets.MONGODB_URI }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          
          # Pull and update using the root compose file (-f ../docker-compose.yml)
          docker compose -f ../docker-compose.yml pull hospital-backend
          docker compose -f ../docker-compose.yml up -d hospital-backend

      - name: Free up disk space
        run: docker system prune -f      