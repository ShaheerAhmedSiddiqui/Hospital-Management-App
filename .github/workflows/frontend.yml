name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-frontend .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-frontend

      - name: Deploy Frontend Container via Docker Compose
        run: |
          # Export variables for the docker-compose.yml file to read
          export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
          export MONGODB_URI="${{ secrets.MONGODB_URI }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          
          # Move up out of the frontend folder into the project root
          cd ..
          
          docker-compose pull hospital-frontend
          docker-compose up -d hospital-frontend
              
      - name: Free up disk space
        run: docker system prune -f