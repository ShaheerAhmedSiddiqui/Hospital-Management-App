name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-frontend .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-frontend

      - name: Deploy Frontend Container
        run: |
          docker stop hospital-frontend || true
          docker rm hospital-frontend || true

          docker pull ${{ secrets.DOCKER_USERNAME }}/hospital-frontend

          docker run -d \
            --name hospital-frontend \
            -p 3000:80 \
            ${{ secrets.DOCKER_USERNAME }}/hospital-
              
      - name: Free up disk space
        run: docker system prune -f        