name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-frontend .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-frontend

      - name: Deploy Frontend Container
        run: |
          # Stop and remove old container if it exists
          docker stop hospital-frontend || true
          docker rm hospital-frontend || true
          
          # Pull the fresh image
          docker pull ${{ secrets.DOCKER_USERNAME }}/hospital-frontend
          
          # Run container attached to the shared bridge network on port 80
          docker run -d \
            --name hospital-frontend \
            --network hospital-network \
            -p 80:80 \
            ${{ secrets.DOCKER_USERNAME }}/hospital-frontend

      - name: Free up disk space
        run: docker system prune -f